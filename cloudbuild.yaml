steps:
  # 1. Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci', '--legacy-peer-deps']

  # 2. Run linting
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'lint']

  # 3. Run unit & integration tests
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'test', '--', '--passWithNoTests', '--ci']

  # 4. Build the Next.js app
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']

  # 5. Build and push container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carbonwise-ai:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carbonwise-ai:latest'
      - '.'

  # 6. Push the container image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/carbonwise-ai:$COMMIT_SHA']

  # 7. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'carbonwise-ai'
      - '--image=gcr.io/$PROJECT_ID/carbonwise-ai:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--max-instances=10'
      - '--port=8080'

images:
  - 'gcr.io/$PROJECT_ID/carbonwise-ai:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/carbonwise-ai:latest'
